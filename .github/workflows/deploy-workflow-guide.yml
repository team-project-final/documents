name: Deploy workflow-guide site

on:
  push:
    branches: [main]
    paths:
      - 'workflow-guides/**'
      - 'build/**'
      - '.github/workflows/deploy-workflow-guide.yml'
  pull_request:
    paths:
      - 'workflow-guides/**'
      - 'build/**'
      - '.github/workflows/deploy-workflow-guide.yml'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: build/package-lock.json
      - run: npm ci
        working-directory: build
      - run: npm test
        working-directory: build
      - run: npm run build
        working-directory: build
        env:
          GITHUB_SHA: ${{ github.sha }}
          BASE_PATH: /workflow-guide
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: build/dist
          retention-days: 7

  deploy:
    needs: build
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.WORKFLOW_GUIDE_DEPLOY_TOKEN }}
          external_repository: team-project-final/workflow-guide
          publish_branch: gh-pages
          publish_dir: ./dist
          commit_message: 'deploy: ${{ github.sha }}'
          user_name: 'workflow-guide-deploy[bot]'
          user_email: 'workflow-guide-deploy@users.noreply.github.com'
      - name: Health check
        run: |
          sleep 60
          curl -fsSL https://team-project-final.github.io/workflow-guide/ > /dev/null
