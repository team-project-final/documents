<h6 id="04-%EC%88%98%ED%96%89-%EA%B2%BD%EA%B3%BC--%E2%91%A1-knowledge">04. 수행 경과 — ② knowledge</h6>
<h1 id="%EA%B9%80%ED%98%84%EC%A7%80c-1--%EB%B0%95%EC%9D%80%EC%84%9Cc-2--%EB%85%B8%ED%8A%B8%EA%B7%B8%EB%9E%98%ED%94%84%EA%B2%80%EC%83%89">김현지(C-1) · 박은서(C-2) — 노트·그래프·검색</h1>
<div class="cols">
<div>
<p><strong>노트·그래프 — 김현지</strong></p>
<ul>
<li>Markdown 노트 CRUD · 버전 이력·복원 · 태그 (소유자 격리 <code>validateOwner</code>)</li>
<li>위키링크 파싱 · 백링크 · PageRank 그래프 (<code>GraphQueryPort</code> 포트 패턴)</li>
<li>Kafka→ES 자동 동기화 (Outbox <code>AFTER_COMMIT</code> · 멱등 Redis TTL 7d · DLQ)</li>
</ul>
</div>
<div>
<p><strong>청킹·검색 — 박은서</strong></p>
<ul>

<ul>
<li><strong>폴리레포 부트스트랩 멱등 자동화(syn)</strong> — <code>repo_exists</code>/<code>secret_exists</code> 가드로 Phase 1~3(레포·시크릿·scaffold) 재실행 안전 + 자동 보고서<br /><span class="small">멱등·재실행 안전 설계로 실패를 수치로 진단·복구.</span></li>
<li><strong>대시보드 자동 파이프라인 vs 수기 데이터</strong> — 파서 CI가 수기 데이터를 덮어써 진행률 역행 → <code>trackAliasMap</code> + history rolling <strong>max(단조 증가)</strong><br /><span class="small">단조 지표는 쓰기 시점에 max 불변식으로 강제.</span></li>
<li><strong>Flyway 버전 표준 + CI 가드</strong> — 전역 정수 버전 수동선택이 부른 V28 중복 → 14자리 타임스탬프 버전 + <code>flyway_guard.py</code><br /><span class="small">표준은 문서가 아니라 CI 가드로 fail-fast 강제.</span></li>
</ul>
</div>
<div>
<p><strong>트러블슈팅</strong></p>
<ul>
<li><strong>gradlew 실행권한 누락 → CI 실패</strong> — <code>gradlew</code>가 100644로 커밋돼 'Permission denied'(암묵적 권한 의존) → file mode 100755 + 워크플로 <code>chmod +x</code> 안전망<br /><span class="small">CI 통과가 행운에 기대지 않게 명시 고정.</span></li>
<li><strong>Gateway Boot 4.0.6 YAML 라우트 버그</strong> — 선언적 라우트 미동작 → <code>RoutesConfig</code>/<code>CorsConfig</code> <strong>Java config 전환</strong> 후 429·CORS 실검증<br /><span class="small">메이저 .0 초기버전은 검증된 programmatic 경로로 우회.</span></li>
<li><strong>분기 보호 ruleset — PR BLOCKED·BEHIND 레이스</strong> — required check를 워크플로명으로 적어 잡명 <code>validate</code>와 불일치 + strict로 직렬 BEHIND → 잡명 정정·strict 완화<br /><span class="small">required check는 잡명으로, strict는 처닝 잦은 main에 부적합.</span></li>
</ul>
</div>
</div>
<footer>SYNAPSE — K-Digital Training 팀별 프로젝트 결과보고서</footer>

<h1 id="%EA%B9%80%ED%95%B4%EC%A4%80--platform-%ED%8A%B8%EB%9E%99-a">김해준 — platform (트랙 A)</h1>
<div class="cols">
<div>
<p><strong>하브루타노트</strong></p>
<ul>
<li><strong>AI Agent 작업 문서 구조 초기화</strong> — Director·Researcher·Worker 역할 분리(<code>docs/ai</code>·<code>DECISION_LOG.md</code>)<br /><span class="small">회고: 프로젝트 초반엔 코드보다 작업 기준 문서가 먼저 잡혀야 한다.</span></li>
<li><strong>Stripe Billing 보안 버그 수정</strong> — <code>/billing/**</code> 전체 permitAll → webhook만 공개·나머지 인증 강제(302→<strong>401</strong>)<br /><span class="small">회고: AI 코드라도 인증·결제·개인정보는 직접 검토 — 검토 책임은 오히려 더 중요해졌다.</span></li>
<li><strong>디자인 목업 워크플로우를 재사용 스킬로 패키징</strong> — 제품명 제거·도메인 중립화 + 토큰 다중 내보내기(Theme/CSS/Tailwind/JSON)<br /><span class="small">회고: 두 번 이상 할 작업은 워크플로우 자체를 산출물로 만든다.</span></li>
</ul>
</div>
<div>
<p><strong>트러블슈팅</strong></p>
<ul>
<li><strong>로컬 실행 인프라 기준 누락</strong> — Dockerfile만 있고 의존 서비스 실행 기준 부재 → <code>docker-compose.yml</code> 추가<br /><span class="small">Dockerfile=빌드 기준, compose=실행 기준(역할이 다르다).</span></li>
<li><strong>Notification Modulith 경계 위반</strong> — notification이 auth 내부 <code>JwtAuthenticationFilter</code> 직접 import → <code>@Qualifier</code> Filter 주입<br /><span class="small">bean 주입이 돼도 패키지 import가 곧 모듈 의존.</span></li>
<li><strong>MSA 협업·세팅 관리 부재</strong> — 세팅 충돌 → 역할 기반 질문 체계(일반/인프라/교육) 정립<br /><span class="small">개인 능력보다 팀 작업흐름·온보딩 관리가 중요.</span></li>
</ul>
</div>

<h1 id="%EA%B9%80%EB%82%98%EA%B2%BD--learning-ai-%ED%8A%B8%EB%9E%99-d-2">김나경 — learning-ai (트랙 D-2)</h1>
<div class="cols">
<div>
<p><strong>하브루타노트</strong></p>
<ul>
<li><strong>FastAPI 골격 + LLM 이중화</strong> — Claude 장애 대비 Tenacity 재시도 → OpenAI Fallback, 토큰 사용량 로깅<br /><span class="small">Fallback을 처음부터 설계에 넣으니 이후 안심이 됐다.</span></li>
<li><strong>pgvector 시맨틱 검색 + 카드 생성 프롬프트</strong> — HNSW 인덱스, Jinja2 템플릿 외부 분리<br /><span class="small">LLM이 마크다운 섞어 반환 → 방어적 파싱이 필수.</span></li>
<li><strong>AiCard Kafka Consumer(재시도·DLQ·멱등) + RAG</strong> — event_id 중복 skip, 60s timeout, Redis 시맨틱 캐시·SSE<br /><span class="small">단일 인스턴스는 인메모리 set, 스케일아웃 시 Redis로.</span></li>
</ul>
</div>
<div>
<p><strong>트러블슈팅</strong></p>
<ul>
<li><strong>Kafka SSL <code>ssl_context</code> 미전달 → CrashLoop</strong> — <code>security_protocol=SSL</code>만으론 부족, 컨텍스트 생성·전달 필요</li>
<li><strong>Kafka Consumer 메모리 누수</strong> — <code>_processed</code> 멱등 set에 상한이 없어 무제한 증가</li>
<li><strong>Consumer 전량 DLQ 이동</strong> — 이벤트 content 계약 불일치로 전부 DLQ행</li>
</ul>
</div>
</div>

<h1 id="%EC%A1%B0%EC%9C%A0%EC%A7%80--learning-card-%ED%8A%B8%EB%9E%99-d-1">조유지 — learning-card (트랙 D-1)</h1>
<div class="cols">
<div>
<p><strong>하브루타노트</strong></p>
<ul>
<li><strong>문서 읽고 역할 파악</strong> — 맡은 복습 기능이 전체 서비스에서 어떤 역할인지 먼저 이해<br /><span class="small">비전공자라 큰 흐름을 먼저 잡으니 이후 개발이 수월.</span></li>
<li><strong>코드리뷰 반영 + E2E 버그 수정</strong> — 로컬 환경 정합, 누락 마이그레이션·스케줄러 쿼리 오류 보완<br /><span class="small">작성만큼 실제 실행·검증 과정이 중요.</span></li>
<li><strong>Flutter <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> 백엔드 연결</strong> — 카드 생성·복습 흐름 동작, 카드 타입 값 정합<br /><span class="small">화면만이 아니라 프론트·백엔드·DB 데이터 기준이 모두 맞아야.</span></li>
</ul>
</div>
<div>
<p><strong>트러블슈팅</strong></p>
<ul>
<li><strong>bootRun 실패 (PostgreSQL/Redis 포트 충돌)</strong> — 로컬 서비스가 Docker와 같은 포트 → 로컬 중지 후 compose 재실행</li>
<li><strong>카드 생성 500 (card_type CHECK 위반)</strong> — 프론트 <code>BASIC</code> <img class="emoji" draggable="false" alt="↔" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2194.svg" data-marp-twemoji=""/> DB 허용값 불일치 → 백엔드 변환</li>
<li><strong>Flutter 저장 버튼 무반응</strong> — 실패를 화면에 미표시 → 저장 실패 시 SnackBar로 노출</li>
</ul>
</div>
</div>

<h1 id="%EB%B0%95%EC%9D%80%EC%84%9C--knowledge-%ED%8A%B8%EB%9E%99-c-2">박은서 — knowledge (트랙 C-2)</h1>

<div>
<p><strong>하브루타노트</strong></p>
<ul>
<li><strong>Spring Modulith 학습·실습</strong> — 주문·재고 예제로 이벤트 기반 모듈 통신 직접 구현<br /><span class="small">개념만보다 작은 예제 구현이 학습 효율↑, &quot;왜 필요한가&quot;를 먼저.</span></li>
<li><strong>semantic/hybrid 검색 + RRF</strong> — BM25 위에 learning-ai 시맨틱 프록시·RRF 병합, 3s 폴백<br /><span class="small">테스트 컨텍스트 공통 빈(ObjectMapper)까지 함께 설계.</span></li>
<li><strong>검색 E2E CI 복구</strong> — <code>@Disabled</code> 제거, <code>searchE2eTest</code> 분리, consumer offset/readiness 정합<br /><span class="small">읽는 데이터 범위·consumer 시작 시점 통제가 핵심.</span></li>
</ul>
</div>
<div>
<p><strong>트러블슈팅</strong></p>

<li><strong>컨트롤러 테스트 실패 — ObjectMapper 빈 누락</strong> — <code>@ConditionalOnMissingBean</code> fallback 빈 추가</li>
<li><strong>NeighborGraph Docker/Postgres 정렬</strong> — Testcontainers→compose 전환, Flyway 유지·<code>ddl-auto: none</code>, pgvector 이미지</li>
</ul>
</div>

<h1 id="%EA%B9%80%ED%98%84%EC%A7%80--knowledge-%ED%8A%B8%EB%9E%99-c-1">김현지 — knowledge (트랙 C-1)</h1>
<div class="cols">
<div>
<p><strong>하브루타노트</strong></p>
<ul>
<li><strong>지식 그래프 API + 포트 패턴</strong> — <code>GET /api/graph/data</code>, <code>GraphQueryPort</code>로 모듈 경계 준수(ArchUnit 통과)<br /><span class="small">포트 패턴으로 Modulith 경계를 지키며 확장성 확보.</span></li>
<li><strong>Kafka→ES 자동 동기화 풀스택</strong> — Outbox(AFTER_COMMIT) + 멱등 Consumer(Redis TTL 7d) + DLQ·Slack + CloudEvents 1.0<br /><span class="small">분산 메시징은 멱등성·실패경로(DLQ)를 처음부터 설계.</span></li>
<li><strong>노트 버전 이력·복원 + 태그 API</strong> — 모든 버전/태그 메서드에 <code>validateOwner</code>(소유자 격리)<br /><span class="small">기능과 동시에 보안·컨벤션을 챙겨야 리뷰가 매끄럽다.</span></li>
</ul>
</div>
<div>
<p><strong>트러블슈팅</strong></p>
<ul>
<li><strong>searchE2eTest 7/7 실패 — nori 미설치</strong> — ES 컨테이너에 한국어 nori 플러그인 부재 → <code>--force-recreate</code> 재생성 후 7/7 PASS<br /><span class="small">테스트 실패=코드버그 아닐 수 있다, 환경 먼저 의심.</span></li>
<li><strong>actuator health DOWN — CI Redis 누락</strong> — 인기태그 캐싱이 Redis 의존인데 CI compose에 부재 → Redis 추가<br /><span class="small">의존성 추가 시 CI 인프라도 함께 챙겨야 health 통과.</span></li>
<li><strong>squash 머지 후 커밋 누락</strong> — squash로 dev가 단일 머지커밋 압축→개별 SHA 어긋남 → dev 기반 새 브랜치+cherry-pick<br /><span class="small">squash 머지 후 기존 브랜치 재사용 금지.</span></li>
</ul>
</div>
</div>
<footer>SYNAPSE — K-Digital Training 팀별 프로젝트 결과보고서</footer>
</section>

<h6 id="05-%ED%95%98%EB%B8%8C%EB%A3%A8%ED%83%80--%ED%8A%B8%EB%9F%AC%EB%B8%94%EC%8A%88%ED%8C%85-77">05. 하브루타 · 트러블슈팅 (7/7)</h6>
<h1 id="%ED%95%9C%EC%8A%B9%EC%99%84--engagement-%ED%8A%B8%EB%9E%99-b">한승완 — engagement (트랙 B)</h1>
<div class="cols">
<div>
<p><strong>하브루타노트</strong></p>
<ul>
<li><strong>community 그룹 CRUD (W1)</strong> — 생성·조회·수정·삭제 + 권한·실패케이스(401/403/400)·soft delete 검증<br /><span class="small">권한·인증·입력·soft delete를 처음부터 잡아야 이후 기능이 안 흔들린다.</span></li>
<li><strong>gamification XP 기초 (W2)</strong> — 누적 XP·이력(<code>user_profiles_gamification</code>·<code>xp_events</code>), <code>eventId</code>/<code>userId+eventType+sourceId</code>로 멱등성<br /><span class="small">점수 누적에도 멱등성 — 중복 한 번에 레벨·리더보드가 틀어진다.</span></li>
<li><strong>Kafka 이벤트 Avro 리팩토링 (W3)</strong> — JSON/CloudEvents → Avro+Schema Registry(<code>LevelUp</code>·<code>BadgeEarned.avsc</code>), 공통메타·key=tenantId<br /><span class="small">Kafka 이벤트는 단순 전송이 아니라 서비스 간 계약.</span></li>
</ul>
</div>
<div>
<p><strong>트러블슈팅</strong></p>
<ul>
<li><strong>status DOWN — Redis 설정 불완전</strong> — host/port/password 누락 → 인증 실패(<code>NOAUTH</code>)로 Actuator health 503/DOWN → 환경별 Redis 설정 연결<br /><span class="small">기능 동작(DB fallback)과 health check는 분리해서 봐야 한다.</span></li>
<li><strong>Flyway 마이그레이션</strong> — JPA Entity≠실제 테이블 보장, 환경마다 schema 갈림 → <code>V번호__설명.sql</code> migration + <code>flyway_schema_history</code> 추적<br /><span class="small">DB 직접 수정 말고 migration 파일로 변경 이력을 코드와 함께.</span></li>
<li><strong>SOFT DELETE</strong> — 진짜 삭제 대신 <code>deleted_at</code> 표시(복구·기록·연관데이터 보호), 조회 시 <code>deleted_at IS NULL</code> 필수<br /><span class="small">지우는 게 아니라 숨기는 방식 — 조회 조건 누락 주의.</span></li>
</ul>
</div>
</div>
<footer>SYNAPSE — K-Digital Training 팀별 프로젝트 결과보고서</footer>

<h6 id="06-%EC%9E%90%EC%B2%B4-%ED%8F%89%EA%B0%80-2">06. 자체 평가</h6>
<h1 id="%EC%84%B1%EA%B3%BC%EC%99%80-%EC%86%8C%EA%B0%90">성과와 소감</h1>
<div class="cols">
<div>
<p><strong>잘한 점</strong></p>
<ul>
<li><strong>정공법 아키텍처</strong> — ADR로 결정을 기록하고 MSA·이벤트 드리븐·Outbox·CQRS를 끝까지 구현</li>
<li><strong>운영까지 완주</strong> — 쿠버네티스·GitOps 실 배포, SLA 실측, 장애 복구, 관측성(Prometheus·Grafana·Loki)</li>
<li><strong>협업 체계</strong> — 7인 멀티레포·크로스리뷰·5종 문서·대시보드로 5주 스프린트 완수</li>
<li>발견한 결함을 <strong>이슈→PR→회귀 검증</strong>으로 닫는 사이클 정착</li>
</ul>
</div>
<div>
<p><strong>아쉬운 점</strong></p>
<ul>
<li>AI 체인의 운영 환경 검증을 발표 주까지 끌고 옴 — 외부 의존(키·스키마)은 더 일찍</li>
<li>식별자 모델 통일을 설계 단계에서 확정하지 못해 후반 비용 발생</li>
<li>검색 품질의 정량 평가(골든셋) 미완</li>
</ul>
<p><strong>경력 연계</strong> — 백엔드·인프라·AI 각자 트랙에서 <strong>현업 표준 도구체인을 실전 경험</strong></p>
</div>
</div>
